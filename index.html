<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hello World - Test Hermes</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: linear-gradient(135deg, #1f2937, #111827);
      color: #e5e7eb;
    }
    .card {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 2rem;
      text-align: center;
      max-width: 480px;
      width: 90%;
      box-shadow: 0 20px 25px -5px rgba(0,0,0,0.25);
    }
    h1 {
      font-size: 2rem;
      margin: 0 0 1rem;
    }
    p {
      color: #9ca3af;
      line-height: 1.6;
    }
    .badge {
      display: inline-block;
      margin-top: 1rem;
      padding: 0.35rem 0.75rem;
      font-size: 0.8rem;
      letter-spacing: 0.05em;
      border-radius: 999px;
      background: #111827;
      color: #9ca3af;
      border: 1px solid #374151;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Hello, World</h1>
    <p>This is a basic hello-world page created by Hermes.</p>
    <div class="badge">deployed</div>
  </div>
</body>
</html>
